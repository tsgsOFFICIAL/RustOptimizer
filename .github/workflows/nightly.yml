name: Nightly Build

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set nightly version
        id: vars
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          [xml]$xml = Get-Content RustOptimizer.csproj
          $baseVersion = $xml.Project.PropertyGroup.FileVersion | Select-Object -First 1
          if (-not $baseVersion) { $baseVersion = "1.0.0" }
          $nightlyVersion = "$baseVersion-nightly.$sha"
          
          echo "sha_short=$sha" >> $env:GITHUB_OUTPUT
          echo "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          echo "nightly_version=$nightlyVersion" >> $env:GITHUB_OUTPUT

      - name: Publish (Self-Contained)
        run: |
          Remove-Item -Recurse -Force publish/self-contained/ -ErrorAction SilentlyContinue
          dotnet publish RustOptimizer.csproj `
            -c Release `
            -r win-x64 `
            -p:SelfContained=true `
            -p:FileVersion=${{ steps.vars.outputs.base_version }} `
            -p:InformationalVersion=${{ steps.vars.outputs.nightly_version }} `
            -p:IncludeSourceRevisionInInformationalVersion=false `
            -o publish/self-contained/

      - name: Publish (Framework-Dependent)
        run: |
          Remove-Item -Recurse -Force publish/framework-dependent/ -ErrorAction SilentlyContinue
          dotnet publish RustOptimizer.csproj `
            -c Release `
            -r win-x64 `
            -p:SelfContained=false `
            -p:FileVersion=${{ steps.vars.outputs.base_version }} `
            -p:InformationalVersion=${{ steps.vars.outputs.nightly_version }} `
            -p:IncludeSourceRevisionInInformationalVersion=false `
            -o publish/framework-dependent/

      - name: Zip (Self-Contained)
        run: Compress-Archive -Path publish/self-contained/* -DestinationPath RustOptimizer-nightly-self-contained.zip -Force

      - name: Zip (Framework-Dependent)
        run: Compress-Archive -Path publish/framework-dependent/* -DestinationPath RustOptimizer-nightly-framework-dependent.zip -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\RustOptimizer.iss'

      - name: Delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create nightly release
        shell: pwsh
        run: |
          $installer = Get-ChildItem "publish/installer/*.exe" | Select-Object -First 1 -ExpandProperty FullName
          gh release create nightly `
            "RustOptimizer-nightly-self-contained.zip" `
            "RustOptimizer-nightly-framework-dependent.zip" `
            "$installer" `
            --title "Nightly Build (${{ steps.vars.outputs.nightly_version }})" `
            --notes "Automated build from commit ${{ steps.vars.outputs.sha_short }} on master." `
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
